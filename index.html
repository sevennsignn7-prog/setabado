<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>出欠管理</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <h2 id="status">読み込み中...</h2>
  <div id="content" style="display:none;">
    <h3 id="eventName"></h3>
    <button onclick="sendAction('参加')">参加</button>
  </div>
  <div id="debugLog" style="background:#eee; padding:10px; font-size:12px;"></div>

  <script>
    const BASE_URL = "https://script.google.com/macros/s/AKfycbzqM4NG5gRfxbbO3Bn_Sy9c9kRvKArdcSbNqo64bZRCSxbmHb1IwisgpY5zvQ372diLlw/exec";
    const eventId = new URLSearchParams(window.location.search).get("eventId");
    function log(m) { document.getElementById('debugLog').innerHTML += m + '<br>'; }

    liff.init({ liffId: "2010509763-NKXClXbZ" }).then(() => {
      document.getElementById('status').innerText = "イベント情報";
      // データ取得（JSONP）
      const s = document.createElement('script');
      s.src = BASE_URL + "?mode=detailStatus&eventId=" + eventId + "&callback=showData";
      document.body.appendChild(s);
    });

    function showData(data) {
      document.getElementById('eventName').innerText = data.eventName;
      document.getElementById('content').style.display = "block";
      log("データ取得成功");
    }

    function sendAction(status) {
      log("送信開始...");
      const s = document.createElement('script');
      s.src = BASE_URL + "?mode=submit&eventId=" + eventId + "&status=" + encodeURIComponent(status) + "&callback=finish";
      document.body.appendChild(s);
    }

    function finish() {
      alert("送信しました！");
      liff.closeWindow();
    }
  </script>
</body>
</html>
