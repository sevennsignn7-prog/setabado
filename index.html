<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>デバッグ画面</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <h2 id="status">初期化中...</h2>
  <div id="debugLog" style="background:#eee; padding:10px; font-size:12px;"></div>

  <script>
    function log(m) { document.getElementById('debugLog').innerHTML += m + '<br>'; }
    
    // LIFF初期化
    liff.init({ liffId: "2010509763-NKXClXbZ" })
      .then(() => {
        document.getElementById('status').innerText = "初期化完了";
        log("LIFF OK");
        // データ取得
        const eventId = new URLSearchParams(window.location.search).get("eventId");
        log("ID: " + eventId);
        
        // 動作テスト用ボタンを表示
        document.body.innerHTML += '<button onclick="testAction()">動作テスト</button>';
      })
      .catch(err => {
        document.getElementById('status').innerText = "初期化失敗";
        log("Error: " + err);
      });

    function testAction() {
      alert("ボタンは正常です！");
    }
  </script>
</body>
</html>
