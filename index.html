<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>デバッグ</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <div id="log" style="font-size: 14px; white-space: pre-wrap;"></div>

  <script>
    const logEl = document.getElementById('log');
    function log(m) { logEl.innerText += m + "\n"; }
    
    const BASE_URL = "https://script.google.com/macros/s/AKfycbzqM4NG5gRfxbbO3Bn_Sy9c9kRvKArdcSbNqo64bZRCSxbmHb1IwisgpY5zvQ372diLlw/exec";
    const eventId = new URLSearchParams(window.location.search).get("eventId");

    liff.init({ liffId: "2010509763-NKXClXbZ" }).then(() => {
      log("初期化完了。通信開始...");
      
      // JSONPではなく、fetchで生のテキストを取得して中身を確認する
      fetch(BASE_URL + "?mode=detailStatus&eventId=" + eventId)
        .then(res => res.text())
        .then(text => {
          log("受信テキスト:\n" + text);
        })
        .catch(e => log("エラー: " + e));
    });
  </script>
</body>
</html>
