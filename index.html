<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>出欠回答</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <h2 id="status">読み込み中...</h2>
  <script>
    const eventId = new URLSearchParams(window.location.search).get("eventId");
    // GAS側で呼び出される関数をグローバルに定義しておく
    window.showData = function(data) {
      document.getElementById('status').innerText = "イベント: " + data.eventName;
      console.log(data);
    };

    liff.init({ liffId: "2010509763-NKXClXbZ" }).then(() => {
      const s = document.createElement('script');
      s.src = "https://script.google.com/macros/s/AKfycbzqM4NG5gRfxbbO3Bn_Sy9c9kRvKArdcSbNqo64bZRCSxbmHb1IwisgpY5zvQ372diLlw/exec?mode=detailStatus&eventId=" + eventId + "&callback=showData";
      document.body.appendChild(s);
    });
  </script>
</body>
</html>
